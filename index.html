<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사다리 타기 확률 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        /* 설정 영역 */
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        .btn-wrapper {
            display: flex;
            align-items: flex-end;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        /* 결과 뷰포트 (그래프 및 표) */
        .result-section {
            display: none; /* 초기에는 숨김 */
            margin-top: 20px;
        }
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
        }
        .chart-container {
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            min-height: 300px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .highlight {
            font-weight: bold;
            color: #e74c3c;
        }
        /* 하단 푸터 영역 스타일 추가 */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 15px;
            color: #7f8c8d;
            border-top: 1px solid #dcdde1;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🪜 사다리 타기 확률 시뮬레이터</h1>
    <div class="description">조건: 꽝의 위치는 항상 가장 왼쪽(1번 도착지)으로 고정됩니다.</div>
    
    <div class="setup-grid">
        <div class="input-group">
            <label for="nodeCount">출발점/도착점 개수</label>
            <input type="number" id="nodeCount" value="5" min="2" max="30">
        </div>
        <div class="input-group">
            <label for="ladderHeight">사다리 줄 개수 (높이)</label>
            <input type="number" id="ladderHeight" value="10" min="1" max="100">
        </div>
        <div class="input-group">
            <label for="trialCount">시뮬레이션 실행 횟수</label>
            <input type="number" id="trialCount" value="5000" min="1" max="100000">
        </div>
        <div class="btn-wrapper">
            <button onclick="runSimulation()">시뮬레이션 시작</button>
        </div>
    </div>

    <div class="result-section" id="resultSection">
        <h2>📊 시뮬레이션 결과 분석</h2>
        <div class="content-layout">
            <div class="chart-container">
                <canvas id="probabilityChart"></canvas>
            </div>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>출발점</th>
                            <th>'꽝' 당첨 횟수</th>
                            <th>당첨 확률</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer>
    대구광역시 달서교육지원청 영재교육원 R&E
</footer>

let currentChart = null;
